<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>運営管理 | アンバサダーポータル</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ログイン -->
<div class="landing" id="login-view">
  <div class="card landing-card">
    <h1>運営管理</h1>
    <form id="login-form">
      <input type="password" id="login-pw" placeholder="パスワード" required autocomplete="current-password">
      <button class="primary" type="submit">ログイン</button>
    </form>
  </div>
</div>

<!-- メイン -->
<div id="main-view" style="display:none">
  <header class="app-header">
    <div class="inner" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <h1>運営管理</h1>
        <div class="sub">アンバサダーポータル</div>
      </div>
      <button class="ghost" id="logout-btn" style="background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff">ログアウト</button>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="subs">活動管理</button>
      <button class="tab-btn" data-tab="bills">リワード管理</button>
      <button class="tab-btn" data-tab="ambs">アンバサダー管理</button>
    </div>

    <!-- 活動管理 -->
    <section class="card tab-panel" id="panel-subs">
      <div class="card-head">
        <h2>活動一覧</h2>
        <div style="display:flex;gap:8px">
          <button class="ghost" id="btn-adj">＋手動追加</button>
          <button class="ghost" id="btn-select-mode">リワード案件作成</button>
        </div>
      </div>
      <div class="filters">
        <div><label>実施年月</label><input type="month" id="f-month"></div>
        <div><label>アンバサダー</label><select id="f-amb"><option value="">すべて</option></select></div>
        <div><label>種別</label>
          <select id="f-type">
            <option value="">すべて</option>
            <option value="content">コンテンツ報告</option>
            <option value="webinar">ウェビナー・セミナー報告</option>
            <option value="referral">紹介</option>
            <option value="adjustment">運営精算</option>
          </select></div>
        <div><label>ステータス</label>
          <select id="f-status">
            <option value="">すべて</option>
            <option value="submitted">確認中</option>
            <option value="approved">承認済み</option>
            <option value="rejected">差し戻し</option>
          </select></div>
      </div>
      <div class="bill-bar" id="bill-bar" style="display:none">
        <span id="bill-bar-info"></span>
        <span style="display:flex;gap:8px">
          <button class="primary" id="btn-make-bill" style="width:auto;margin:0;padding:8px 16px">作成する</button>
          <button class="ghost" id="btn-cancel-select">キャンセル</button>
        </span>
      </div>
      <div class="table-wrap">
        <table class="list" id="subs-table">
          <thead><tr><th id="sel-th" style="width:28px;display:none"></th><th>実施日</th><th>アンバサダー</th><th>種別</th><th>内容</th><th>提案額</th><th>確定額</th><th>ステータス</th><th>リワード案件</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="hist-sub" id="subs-subtotal"></div>
    </section>

    <!-- リワード管理 -->
    <section class="card tab-panel" id="panel-bills" style="display:none">
      <h2>リワード管理</h2>
      <p class="muted">リワード案件は活動管理から承認済みの活動を選択して作成します。発送前は修正・削除ができます。行をクリックすると対象活動が表示されます。</p>
      <div class="table-wrap">
        <table class="list" id="bills-table">
          <thead><tr><th>作成日</th><th>アンバサダー</th><th>タイトル</th><th>件数</th><th>合計</th><th>支払い月</th><th>状態</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- アンバサダー管理 -->
    <section class="card tab-panel" id="panel-ambs" style="display:none">
      <h2>アンバサダー管理</h2>
      <form id="amb-add" class="filters">
        <div><label>名前</label><input type="text" id="amb-name" required placeholder="例：けいたろう"></div>
        <div style="flex:2"><label>説明</label><input type="text" id="amb-desc" placeholder="例：Shift AI講師・YouTube発信"></div>
        <div style="flex:0"><button class="primary" style="margin-top:0;width:auto;padding:10px 18px" type="submit">登録</button></div>
      </form>
      <div class="table-wrap">
        <table class="list" id="ambs-table">
          <thead><tr><th>名前</th><th>説明</th><th style="width:54px"></th><th>提出数</th><th>状態</th><th>専用リンク</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<!-- 提出詳細モーダル -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="close" id="modal-close">×</button>
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div id="modal-review"></div>
  </div>
</div>


<!-- 手動追加（運営精算）モーダル -->
<div class="modal-bg" id="adj-modal-bg">
  <div class="modal">
    <button class="close" id="adj-close">×</button>
    <h2>活動の手動追加（運営精算）</h2>
    <p class="muted">紹介成約の残金など、運営側から計上する項目です。<b>登録と同時に承認されます。</b></p>
    <label class="field">アンバサダー<select id="adj-amb"></select></label>
    <label class="field">内容<input type="text" id="adj-title" placeholder="例：紹介成約の残金（○○さん・初回活動完了）"></label>
    <label class="field">金額（円）<input type="number" id="adj-amount" min="0"></label>
    <label class="field">実施日<input type="date" id="adj-date"></label>
    <label class="field">メモ（任意）<textarea id="adj-memo"></textarea></label>
    <button class="primary" id="adj-submit">登録する（自動承認）</button>
  </div>
</div>

<!-- リワード案件 作成・修正モーダル -->
<div class="modal-bg" id="bill-modal-bg">
  <div class="modal">
    <button class="close" id="bill-close">×</button>
    <h2 id="bill-modal-title">リワード案件の作成</h2>
    <div id="bill-info" class="hint"></div>
    <label class="field">タイトル<span class="req">*</span><input type="text" id="bill-title" placeholder="例：2026年6月分"></label>
    <label class="field">支払い月（任意）<input type="month" id="bill-paymonth"></label>
    <label class="field">支払い方法（任意 — 発送時には必須）
      <select id="bill-method">
        <option value="">未定</option>
        <option value="amazon">Amazonギフト</option>
        <option value="transfer">海外送金</option>
      </select></label>
    <label class="field" id="bill-codes-field" style="display:none">ギフトカード番号（1行に1枚）
      <textarea id="bill-codes" placeholder="AMZN-XXXX-XXXX-XXXX&#10;AMZN-YYYY-YYYY-YYYY"></textarea></label>
    <label class="field" id="bill-date-field" style="display:none">送金日
      <input type="date" id="bill-date"></label>
    <label class="field">メモ（任意）<textarea id="bill-memo"></textarea></label>
    <button class="primary" id="bill-submit">作成する</button>
  </div>
</div>

<div id="toast"></div>
<script src="/js/admin.js"></script>
</body>
</html>
