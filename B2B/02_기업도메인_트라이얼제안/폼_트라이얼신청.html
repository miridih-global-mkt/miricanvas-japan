<!DOCTYPE html>
<!--
  기업도메인 트라이얼 제안 — 신청 폼 (HTML)
  ※ action은 백엔드(자체/Google Form/Formspree 등) 연결 필요. 현재 action="#" 플레이스홀더.
  ※ 라우팅: 7(ご関心) = 팀/개인 경로 분기 / 5·6 = WS 부여방식 / 4 = 중복회사 구분
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミリキャンバス B2B導入支援 お申し込み</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#f4f5f7; font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,'Yu Gothic',sans-serif; color:#333; line-height:1.7; }
  .wrap { max-width:560px; margin:0 auto; padding:32px 16px 56px; }
  .card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .bar { height:6px; background:#2563eb; }
  .pad { padding:28px 28px 32px; }
  h1 { font-size:20px; margin:0 0 6px; }
  .sub { font-size:14px; color:#666; margin:0 0 20px; }
  .note { background:#f0f5ff; border:1px solid #d6e2ff; border-radius:8px; padding:12px 14px; font-size:13px; color:#1d4ed8; margin:0 0 24px; }
  label { display:block; font-size:14px; font-weight:bold; margin:18px 0 6px; }
  .req { color:#e0245e; font-size:12px; font-weight:normal; margin-left:4px; }
  .opt { color:#999; font-size:12px; font-weight:normal; margin-left:4px; }
  input[type=text], input[type=email], select { width:100%; padding:11px 12px; font-size:15px; border:1px solid #ccd2db; border-radius:8px; font-family:inherit; }
  input:focus, select:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
  .radio { font-weight:normal; font-size:14.5px; margin:8px 0 0; display:flex; align-items:flex-start; gap:8px; cursor:pointer; }
  .radio input { margin-top:3px; }
  .group { margin-top:6px; }
  button { width:100%; margin-top:28px; padding:15px; font-size:16px; font-weight:bold; color:#fff; background:#2563eb; border:none; border-radius:8px; cursor:pointer; font-family:inherit; }
  button:hover { background:#1d4ed8; }
  .foot { font-size:12px; color:#999; text-align:center; margin-top:18px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="bar"></div>
      <div class="pad">
        <h1>ミリキャンバス B2B導入支援 お申し込み</h1>
        <p class="sub">既存のお客様限定・有料プラン無料キャンペーン（入力は30秒ほどで完了します）</p>
        <div class="note">契約書・お支払い情報・自動課金は一切不要。社内稟議を通さずに始められます。</div>

        <form action="#" method="post">
          <label>会社名<span class="req">必須</span></label>
          <input type="text" name="company" required placeholder="株式会社○○○">

          <label>お名前<span class="req">必須</span></label>
          <input type="text" name="name" required placeholder="山田 太郎">

          <label>メールアドレス<span class="req">必須</span></label>
          <input type="email" name="email" required placeholder="taro@example.co.jp">

          <label>部署・役職<span class="opt">任意</span></label>
          <input type="text" name="dept" placeholder="マーケティング部 / 課長 など">

          <label>社内でのおおよその利用人数<span class="req">必須</span></label>
          <select name="size" required>
            <option value="" disabled selected>選択してください</option>
            <option>〜5名</option>
            <option>6〜30名</option>
            <option>31〜100名</option>
            <option>100名〜</option>
          </select>

          <label>導入のご希望<span class="req">必須</span></label>
          <div class="group">
            <label class="radio"><input type="radio" name="scope" value="team" required>自分の部署・チームで使いたい</label>
            <label class="radio"><input type="radio" name="scope" value="company">全社的に導入を検討したい</label>
            <label class="radio"><input type="radio" name="scope" value="undecided">まだ未定</label>
          </div>

          <label>ご関心<span class="req">必須</span></label>
          <div class="group">
            <label class="radio"><input type="radio" name="interest" value="team" required>チームで使う（ワークスペース・最大100名・6か月無料）</label>
            <label class="radio"><input type="radio" name="interest" value="personal">まず個人で使う（Proプラン・1か月無料）</label>
          </div>

          <button type="submit">無料で申し込む</button>
          <p class="foot">お申し込み後、担当のキムよりご案内いたします。</p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
