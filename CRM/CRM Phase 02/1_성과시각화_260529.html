<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 헤더 */
header{background:#1a1a2e;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:16px;font-weight:600}
header span{font-size:11px;color:#aaa}

/* 칩 바 */
.chip-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 24px;display:flex;gap:8px;flex-shrink:0}
.chip{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#f0f2f5;color:#555}
.chip:hover{background:#e8eaf0}
.chip.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}

/* 본문 스플릿 */
.main{display:grid;grid-template-columns:1fr 1fr;gap:0;flex:1;overflow:hidden}

/* 좌측 결과 */
.panel-left{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;border-right:2px solid #e0e0e0;min-height:0}

.section-box{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;flex-shrink:0}
.section-title{padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff}
.title-jas{background:#2c3e50}
.title-good{background:#27ae60}
.title-neutral{background:#95a5a6}
.title-bad{background:#e67e22}
.title-banned{background:#c0392b}

table{width:100%;border-collapse:collapse;table-layout:fixed}
table col.c-camp{width:52px}
table col.c-mail{width:auto}
table col.c-act{width:44px}
table col.c-kpi{width:44px}
table col.c-n{width:76px}
table col.c-gr{width:40px}
thead th{font-size:10px;color:#aaa;text-transform:uppercase;padding:5px 8px;background:#fafafa;border-bottom:1px solid #eee;text-align:center;font-weight:500}
thead th:first-child{text-align:left}
tbody tr{border-left:4px solid transparent;cursor:grab}
tbody tr:hover{filter:brightness(.97)}
tbody tr.dragging-row{opacity:.4}
tbody td{padding:5px 8px;font-size:12px;vertical-align:middle;border-bottom:1px solid #f5f5f5}
.row-A{border-left-color:#27ae60!important;background:#f0fff4}
.row-B{border-left-color:#2980b9!important;background:#f0f8ff}
.row-C{border-left-color:#f39c12!important;background:#fffdf0}
.row-G{border-left-color:#bdc3c7!important}
.row-D,.row-E{border-left-color:#c0392b!important;background:#fff0f0}
.mail-name{font-weight:500;color:#2c3e50;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.camp-tag{font-size:10px;color:#999}
.td-score{text-align:center;font-weight:600;font-size:12px}
.pos{color:#27ae60}.neg{color:#c0392b}.zero{color:#bbb}
.td-n{text-align:right;font-size:10px;color:#888}
.n-warn{color:#e67e22;font-weight:600}.n-crit{color:#c0392b;font-weight:700}
.ctrl-n{color:#bbb;font-size:9px}
.grade-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;text-align:center}
.badge-A{background:#27ae60;color:#fff}.badge-B{background:#2980b9;color:#fff}
.badge-C{background:#f39c12;color:#fff}.badge-G{background:#e0e0e0;color:#666}
.badge-D,.badge-E{background:#c0392b;color:#fff}
.empty-msg{padding:10px 14px;font-size:12px;color:#bbb}

/* 우측 구성 */
.panel-right{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:0}
.right-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.right-header h3{font-size:13px;font-weight:600;color:#333}
.right-actions{display:flex;gap:8px}
.btn-save{padding:6px 16px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.btn-save:hover{background:#2c3e50}
.btn-reset{padding:6px 12px;background:#f0f2f5;color:#555;border:1px solid #ddd;border-radius:6px;font-size:12px;cursor:pointer}
.btn-reset:hover{background:#e0e0e0}
.save-toast{font-size:11px;color:#27ae60;font-weight:600;opacity:0;transition:opacity .3s}
.save-toast.show{opacity:1}

.drag-list{display:flex;flex-direction:column;gap:6px}
.drag-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:8px 12px;display:flex;align-items:center;gap:10px;cursor:grab;border-left:4px solid transparent;user-select:none;transition:box-shadow .15s,opacity .15s}
.drag-card:active{cursor:grabbing}
.drag-card.dragging{opacity:.4;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.drag-card.drag-over{box-shadow:0 0 0 2px #1a1a2e}
.drag-handle{color:#ccc;font-size:16px;flex-shrink:0}
.drag-seq{width:24px;height:24px;background:#1a1a2e;color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drag-info{flex:1;min-width:0}
.drag-mail{font-size:12px;font-weight:500;color:#2c3e50;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drag-camp{font-size:10px;color:#999}
.drag-remove{background:none;border:none;color:#ccc;font-size:15px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
.drag-remove:hover{color:#c0392b}
.right-note{font-size:11px;color:#aaa;padding:4px 2px}
.drag-placeholder{height:4px;background:#1a1a2e;border-radius:2px;flex-shrink:0;pointer-events:none}
.empty-drop{border:2px dashed #ddd;border-radius:8px;padding:24px;text-align:center;font-size:12px;color:#bbb;transition:all .15s;margin-top:4px}
.empty-drop.over{border-color:#1a1a2e;background:#f0f4ff;color:#555}
</style>

const SEGS = ['NULL','STUDENT','COMPANY','INDIVIDUAL','EDUCATION','BUSINESS','INSTITUTION'];
const JAS_ORDER = ['4step_empathy','aip_curiosity','font','bgremove','table','graph','templatemix','bookmark'];

let currentSeg = 'NULL';
let dragSrc = null;

// 유틸
function sc(v){const n=parseInt(v);return isNaN(n)||n===0?'zero':n>0?'pos':'neg'}
function ss(v){const n=parseInt(v);return isNaN(n)?'—':(n>0?'+':'')+n}
function nCls(nC){return nC<30?'n-crit':nC<80?'n-warn':''}
function nTag(nC){return nC<30?' 🔴':nC<80?' ⚠':''}
function campLabel(c){return c.replace('JA_SERIES','JAS').replace('EDU_SERIES','EDU')}
function mailId(r){return r.camp+'|'+r.mail}

// 칩 렌더
function renderChips(){
  const bar = document.getElementById('chipBar');
  bar.innerHTML = SEGS.map(s=>
    `<div class="chip${s===currentSeg?' active':''}" onclick="selectSeg('${s}')">${s}</div>`
  ).join('');
}

// 세그 선택
function selectSeg(seg){
  currentSeg = seg;
  renderChips();
  renderLeft(seg);
  renderRight(seg);
}

// 좌측: 4개 섹션 테이블
function renderLeft(seg){
  const cells = RAW.filter(r=>r.seg===seg);
  const jas     = cells.filter(r=>r.camp==='JA_SERIES').sort((a,b)=>JAS_ORDER.indexOf(a.mail)-JAS_ORDER.indexOf(b.mail));
  const good    = cells.filter(r=>r.camp!=='JA_SERIES'&&(r.grade==='A'||r.grade==='B')).sort((a,b)=>b.act-a.act);
  const neutral = cells.filter(r=>r.camp!=='JA_SERIES'&&r.grade==='G'&&r.act>=0).sort((a,b)=>b.act-a.act);
  const bad     = cells.filter(r=>r.camp!=='JA_SERIES'&&((r.grade==='G'&&r.act<0)||r.grade==='D')).sort((a,b)=>a.act-b.act);
  const banned  = cells.filter(r=>r.camp!=='JA_SERIES'&&r.grade==='E').sort((a,b)=>a.act-b.act);

  document.getElementById('panelLeft').innerHTML = [
    buildTable('JAS 시리즈','title-jas',jas),
    buildTable('좋은 것 (A/B)','title-good',good),
    buildTable('중립 (G, act≥0)','title-neutral',neutral),
    buildTable('안 좋은 것 (D, act<0)','title-bad',bad),
    buildTable('금지 검토 (E)','title-banned',banned),
  ].join('');
}

function buildTable(title, titleClass, rows){
  const body = rows.length===0
    ? `<div class="empty-msg">해당 없음</div>`
    : `<table><colgroup><col class="c-camp"><col class="c-mail"><col class="c-act"><col class="c-kpi"><col class="c-n"><col class="c-gr"></colgroup>
      <thead><tr><th>캠페인</th><th>메일</th><th>단기</th><th>장기</th><th>모수</th><th>등급</th></tr></thead>
      <tbody>${rows.map(r=>{
        const nc=nCls(r.nC),nt=nTag(r.nC);
        const id=mailId(r);
        return `<tr class="row-${r.grade}" draggable="true" data-id="${id}"
          ondragstart="onRowDragStart(event,'${id}')"
          ondragend="onRowDragEnd(event)">
          <td class="camp-tag">${campLabel(r.camp)}</td>
          <td><div class="mail-name">${r.mail}</div></td>
          <td class="td-score ${sc(r.act)}">${ss(r.act)}</td>
          <td class="td-score ${sc(r.kpi)}">${ss(r.kpi)}</td>
          <td class="td-n ${nc}">n=${r.nT.toLocaleString()}${nt}<div class="ctrl-n">ctrl ${r.nC}</div></td>
          <td style="text-align:center"><span class="grade-badge badge-${r.grade}">${r.grade}</span></td>
        </tr>`;
      }).join('')}</tbody></table>`;
  return `<div class="section-box">
    <div class="section-title ${titleClass}">${title}</div>
    ${body}
  </div>`;
}

// ===== 드래그 상태 =====
let dragType = null;  // 'row' | 'card'
let dragId   = null;
let dragCard = null;
let ph       = null;  // placeholder element

function makePH(){
  const d = document.createElement('div');
  d.className = 'drag-placeholder';
  return d;
}

function removePH(){
  if(ph && ph.parentNode){ ph.parentNode.removeChild(ph); }
  ph = null;
}

// 마우스 y 위치로 리스트 내 삽입 위치 계산
function getInsertBefore(list, clientY){
  const cards = [...list.querySelectorAll('.drag-card:not(.dragging)')];
  for(const card of cards){
    const rect = card.getBoundingClientRect();
    if(clientY < rect.top + rect.height * 0.5) return card;
  }
  return null; // 맨 끝
}

function movePH(list, clientY){
  if(!ph){ ph = makePH(); }
  const before = getInsertBefore(list, clientY);
  if(before) list.insertBefore(ph, before);
  else list.appendChild(ph);
}

// 좌측 행 dragstart
function onRowDragStart(e, id){
  dragType = 'row';
  dragId   = id;
  e.dataTransfer.effectAllowed = 'copy';
  e.currentTarget.classList.add('dragging-row');
}
function onRowDragEnd(e){
  e.currentTarget.classList.remove('dragging-row');
  removePH();
  dragType = null; dragId = null;
}

// ===== 우측 패널 =====
function defaultOrder(seg){ return []; }

function loadOrder(seg){
  try{const s=localStorage.getItem('crm_seq_'+seg);return s?JSON.parse(s):null}catch{return null}
}
function saveOrder(seg,order){
  localStorage.setItem('crm_seq_'+seg,JSON.stringify(order));
}

function renderRight(seg){
  const order = loadOrder(seg) || defaultOrder(seg);
  const byId  = {};
  RAW.filter(r=>r.seg===seg).forEach(r=>{ byId[mailId(r)]=r; });
  const items = order.filter(id=>byId[id]).map(id=>byId[id]);

  const panel = document.getElementById('panelRight');
  panel.innerHTML = `
    <div class="right-header">
      <h3>구성 순서</h3>
      <div class="right-actions">
        <span class="save-toast" id="toast">저장됨 ✓</span>
        <button class="btn-reset" onclick="resetOrder()">비우기</button>
        <button class="btn-save" onclick="doSave()">저장</button>
      </div>
    </div>
    <div class="right-note">좌측 행을 끌어 카드 앞/뒤에 놓기 · 카드 드래그로 순서 변경</div>
    <div class="drag-list" id="dragList">
      ${items.map((r,i)=>makeCard(r,i+1)).join('')}
    </div>
    <div class="empty-drop" id="emptyDrop" style="${items.length?'display:none':''}">
      좌측에서 메일을 끌어다 놓으세요
    </div>`;

  initCardDrag();
  initEmptyDrop();
}

function makeCard(r, seq){
  const id = mailId(r);
  return `<div class="drag-card row-${r.grade}" draggable="true" data-id="${id}">
    <span class="drag-handle">⠿</span>
    <span class="drag-seq">${seq}</span>
    <div class="drag-info">
      <div class="drag-mail">${r.mail}</div>
      <div class="drag-camp">${campLabel(r.camp)}</div>
    </div>
    <span class="grade-badge badge-${r.grade}">${r.grade}</span>
    <button class="drag-remove" onclick="removeCard('${id}')" title="제거">×</button>
  </div>`;
}

function getById(){
  const m={};
  RAW.filter(r=>r.seg===currentSeg).forEach(r=>{ m[mailId(r)]=r; });
  return m;
}

function addCardEnd(id){
  const byId=getById(), r=byId[id];
  if(!r) return;
  const list=document.getElementById('dragList');
  if(list.querySelector(`[data-id="${id}"]`)) return;
  const seq=list.querySelectorAll('.drag-card').length+1;
  list.insertAdjacentHTML('beforeend', makeCard(r,seq));
  bindNewCards(list);
  updateSeqNums();
  syncEmptyDrop();
}

function removeCard(id){
  const card = document.querySelector(`#dragList [data-id="${id}"]`);
  if(card){ card.remove(); updateSeqNums(); syncEmptyDrop(); }
}

function syncEmptyDrop(){
  const list = document.getElementById('dragList');
  const ed = document.getElementById('emptyDrop');
  if(!ed) return;
  ed.style.display = list.querySelectorAll('.drag-card').length ? 'none' : '';
}

function initEmptyDrop(){
  const ed = document.getElementById('emptyDrop');
  if(!ed) return;
  ed.addEventListener('dragover', e=>{
    if(dragType==='row'){ e.preventDefault(); ed.classList.add('over'); }
  });
  ed.addEventListener('dragleave', ()=> ed.classList.remove('over'));
  ed.addEventListener('drop', e=>{
    e.preventDefault();
    ed.classList.remove('over');
    if(dragType==='row' && dragId){ addCardEnd(dragId); dragType=null; dragId=null; }
  });
}

function initCardDrag(){
  const list = document.getElementById('dragList');

  // 리스트 수준 dragover/drop — 최초 1회만 등록
  if(!list.dataset.listInit){
    list.dataset.listInit = '1';

    list.addEventListener('dragover', e=>{
      e.preventDefault();
      movePH(list, e.clientY);
    });
    list.addEventListener('dragleave', e=>{
      if(!list.contains(e.relatedTarget)) removePH();
    });
    list.addEventListener('drop', e=>{
      e.preventDefault();
      if(!ph){ dragType=null; dragCard=null; dragId=null; return; }

      if(dragType==='card' && dragCard){
        list.insertBefore(dragCard, ph);
        dragCard.classList.remove('dragging');
      } else if(dragType==='row' && dragId){
        const r = getById()[dragId];
        if(r && !list.querySelector(`[data-id="${dragId}"]`)){
          const seq = list.querySelectorAll('.drag-card').length + 1;
          ph.insertAdjacentHTML('beforebegin', makeCard(r, seq));
          bindNewCards(list);
        }
      }
      removePH();
      updateSeqNums();
      syncEmptyDrop();
      dragType=null; dragCard=null; dragId=null;
    });
  }

  bindNewCards(list);
}

// 새로 생긴 카드에만 dragstart 바인딩
function bindNewCards(list){
  list.querySelectorAll('.drag-card').forEach(card=>{
    if(card.dataset.initDrag) return;
    card.dataset.initDrag = '1';
    card.addEventListener('dragstart', e=>{
      dragType='card'; dragCard=card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend', ()=>{
      card.classList.remove('dragging');
      removePH();
      updateSeqNums();
      dragType=null; dragCard=null;
    });
  });
}

function updateSeqNums(){
  document.querySelectorAll('#dragList .drag-seq').forEach((el,i)=>el.textContent=i+1);
}

function currentIds(){
  return [...document.querySelectorAll('#dragList .drag-card')].map(c=>c.dataset.id);
}

function doSave(){
  saveOrder(currentSeg, currentIds());
  const toast=document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

function resetOrder(){
  saveOrder(currentSeg,[]);
  renderRight(currentSeg);
}

// 초기화
renderChips();
selectSeg('NULL');
</script>
</body>
</html>
