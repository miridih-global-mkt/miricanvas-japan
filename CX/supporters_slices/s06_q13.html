      <span class="optional">（複数選択可）</span>

    <div class="options-list">
      <label class="option-item">
        <input type="checkbox" name="custom_attributes[supporters_target][]" value="職場の同僚・上司">

      <label class="option-item">

      <label class="option-item">
        <input type="checkbox" name="custom_attributes[supporters_target][]" value="オンラインコミュニティのメンバー">
        <span class="option-label">オンラインコミュニティのメンバー</span>
      </label>

      </label>
      <label class="option-item">
        <input type="checkbox" name="custom_attributes[supporters_target][]" value="特に紹介したい方はいない">

      <label class="option-item">
        <input type="checkbox" name="custom_attributes[supporters_target][]" value="その他">

      </label>
