<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>미캔재팬</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;
  background:#f0f0f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#1a1a1a}

/* ── Toolbar ── */
#toolbar{display:flex;align-items:center;gap:4px;padding:0 10px;height:46px;
  background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid #d0d0d0;flex-shrink:0;user-select:none}

.nav-btn{display:flex;align-items:center;justify-content:center;
  width:30px;height:28px;border:none;background:none;border-radius:6px;
  cursor:pointer;color:#505050;transition:background .12s,color .12s;flex-shrink:0}
.nav-btn:hover:not([disabled]){background:rgba(0,0,0,.07);color:#111}
.nav-btn[disabled]{color:#c8c8c8;cursor:default;pointer-events:none}
.nav-btn svg{width:15px;height:15px}

.nav-divider{width:1px;height:18px;background:#e0e0e0;margin:0 3px;flex-shrink:0}

/* Breadcrumb */
#breadcrumb{flex:1;display:flex;align-items:center;min-width:0;overflow:hidden;
  padding:0 6px;gap:1px}
.bc-seg{font-size:12.5px;color:#444;cursor:pointer;border-radius:4px;
  padding:3px 6px;white-space:nowrap;transition:background .1s;flex-shrink:0}
.bc-seg:hover{background:rgba(0,0,0,.06);color:#111}
.bc-seg.bc-last{color:#111;font-weight:500;cursor:default}
.bc-seg.bc-last:hover{background:none}
.bc-arrow{color:#ccc;flex-shrink:0;display:flex;align-items:center}
.bc-arrow svg{width:11px;height:11px}

/* Sort controls */
.sort-wrap{display:flex;gap:2px;flex-shrink:0;margin-left:6px;
  background:#ebebeb;border-radius:7px;padding:2px}
.sort-btn{border:none;background:none;padding:3px 10px;font-size:11px;
  border-radius:5px;cursor:pointer;color:#666;transition:all .12s;white-space:nowrap}
.sort-btn.on{background:#fff;color:#111;font-weight:500;
  box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ── Workspace ── */
#workspace{display:flex;flex:1;min-height:0;overflow:hidden}

/* Grid area */
#grid-wrap{flex:0 0 55%;min-width:280px;display:flex;flex-direction:column;overflow:hidden}
#grid{flex:1;overflow-y:auto;padding:12px 10px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
  gap:2px;align-content:start;outline:none}
#grid:empty::after{content:'빈 폴더';color:#bbb;font-size:12px;
  padding:30px;grid-column:1/-1;text-align:center}

/* Grid items */
.gi{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:7px 5px 6px;border-radius:5px;cursor:default;
  border:1.5px solid transparent;transition:background .1s,border-color .1s;
  user-select:none;-webkit-user-select:none}
.gi:hover{background:rgba(0,102,204,.07)}
.gi.sel{background:rgba(0,102,204,.14);border-color:rgba(0,102,204,.4)}
.gi.arc{opacity:.38}
.gi-icon{width:46px;height:46px;flex-shrink:0}
.gi-icon svg{width:46px;height:46px}
.gi-label{font-size:10.5px;text-align:center;line-height:1.35;word-break:break-all;
  max-width:100%;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}

/* Resizer */
#resizer{flex:0 0 4px;cursor:col-resize;background:#d8d8d8;flex-shrink:0;
  transition:background .15s;position:relative}
#resizer::after{content:'';position:absolute;top:0;bottom:0;left:-4px;right:-4px}
#resizer:hover,#resizer.drag{background:#94a3b8}

/* Preview panel */
#preview{flex:1;min-width:0;display:flex;flex-direction:column;
  background:#fff;border-left:1px solid #e0e0e0}
#pv-head{padding:9px 14px 8px;border-bottom:1px solid #eaeaea;flex-shrink:0}
#pv-fname{font-size:12.5px;font-weight:600;color:#111;margin-bottom:4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#pv-urlrow{display:flex;align-items:center;gap:5px}
#pv-urltext{flex:1;font-size:10px;color:#aaa;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,monospace}
.pv-btn{border:1px solid #d8d8d8;background:#f7f7f7;border-radius:5px;
  font-size:10.5px;padding:2px 9px;cursor:pointer;color:#444;
  white-space:nowrap;flex-shrink:0;transition:background .1s}
.pv-btn:hover{background:#ebebeb}
.pv-btn.ok{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
#pv-body{flex:1;position:relative;overflow:hidden}
#pv-empty{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:#d0d0d0;font-size:11.5px;pointer-events:none;user-select:none}
#pv-empty svg{width:36px;height:36px}
#pv-frame{width:100%;height:100%;border:none;display:none}
#pv-md{padding:26px 30px;overflow-y:auto;height:100%;display:none;
  font-size:13.5px;line-height:1.78;color:#374151}
#pv-md h1{font-size:1.25em;font-weight:700;margin:0 0 .5em;
  border-bottom:1px solid #f0f0f0;padding-bottom:.3em;color:#111}
#pv-md h2{font-size:1.07em;font-weight:600;margin:1em 0 .3em;color:#222}
#pv-md h3{font-size:.97em;font-weight:600;margin:.8em 0 .25em;color:#333}
#pv-md p{margin:.4em 0}
#pv-md ul,#pv-md ol{margin:.3em 0 .3em 1.4em}
#pv-md li{margin:.15em 0}
#pv-md code{background:#f3f4f6;border-radius:3px;padding:1px 5px;
  font-size:.87em;font-family:ui-monospace,monospace}
#pv-md pre{background:#f3f4f6;border-radius:6px;padding:12px 14px;overflow-x:auto;margin:.6em 0}
#pv-md pre code{background:none;padding:0}
#pv-md a{color:#2563eb;text-decoration:none}
#pv-md a:hover{text-decoration:underline}
#pv-md hr{border:none;border-top:1px solid #e5e7eb;margin:1em 0}
#pv-md blockquote{border-left:3px solid #e5e7eb;padding:.2em .9em;color:#6b7280;margin:.5em 0}
#pv-md table{border-collapse:collapse;width:100%;margin:.6em 0;font-size:.93em}
#pv-md th,#pv-md td{border:1px solid #e5e7eb;padding:5px 10px;text-align:left}
#pv-md th{background:#f9fafb;font-weight:600}
#pv-md tr:nth-child(even) td{background:#fafafa}
#pv-md img{max-width:100%;border-radius:4px}

/* Status bar */
#statusbar{height:26px;display:flex;align-items:center;padding:0 14px;
  background:rgba(255,255,255,.9);border-top:1px solid #d4d4d4;
  font-size:11px;color:#666;flex-shrink:0;gap:12px;user-select:none}
#st-sep{color:#d8d8d8}
</style>
</head>

// ── SVG icons ──
function folderSVG(isPub) {
  if (isPub) return `<svg viewBox="0 0 48 44" fill="none">
    <rect x="1" y="13" width="46" height="29" rx="4" fill="#3B82F6"/>
    <path d="M1 13V10Q1 7 5 7H19Q23 7 24 11L24 13Z" fill="#60A5FA"/>
    <rect x="1" y="13" width="46" height="7" rx="0" fill="rgba(255,255,255,.12)"/>
    <text x="24" y="33" text-anchor="middle" fill="white" font-size="9" font-weight="700" font-family="ui-monospace,monospace">pub</text>
  </svg>`;
  return `<svg viewBox="0 0 48 44" fill="none">
    <rect x="1" y="13" width="46" height="29" rx="4" fill="#F5A623"/>
    <path d="M1 13V10Q1 7 5 7H19Q23 7 24 11L24 13Z" fill="#FAC05E"/>
    <rect x="1" y="13" width="46" height="7" fill="rgba(255,255,255,.15)"/>
    <rect x="1" y="13" width="46" height="29" rx="4" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1"/>
  </svg>`;
}

function fileSVG(ext) {
  const palette = {
    html: {bg:'#DBEAFE', fg:'#1D4ED8', fold:'#BFDBFE'},
    md:   {bg:'#D1FAE5', fg:'#065F46', fold:'#A7F3D0'},
  };
  const c = palette[ext] || {bg:'#F3F4F6', fg:'#6B7280', fold:'#E5E7EB'};
  const label = (ext||'').toUpperCase().slice(0,4);
  return `<svg viewBox="0 0 40 50" fill="none">
    <path d="M6 0h20l10 10v36a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2z" fill="${c.bg}" stroke="${c.fold}" stroke-width="1.2"/>
    <path d="M26 0v10h10" stroke="${c.fold}" stroke-width="1.2" fill="${c.fold}"/>
    <text x="20" y="36" text-anchor="middle" fill="${c.fg}" font-size="8.5" font-weight="700" font-family="ui-monospace,monospace">${label}</text>
  </svg>`;
}

const SEP_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

// ── State ──
let cur = TREE, cpath = [], hist = [], fwd = [];
let sel = null, selIdx = -1;
let sortBy = 'name';
let nodes = [];   // flat ordered list in current grid
let curUrl = '', curExt = '';

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ── Navigation ──
function navTo(node, np, push=true) {
  if (push) { hist.push({node:cur, path:cpath.slice()}); fwd=[]; }
  cur=node; cpath=np; sel=null; selIdx=-1;
  render();
}

function goBack() {
  if (!hist.length) return;
  fwd.push({node:cur, path:cpath.slice()});
  const s=hist.pop(); cur=s.node; cpath=s.path; sel=null; selIdx=-1; render();
}

function goFwd() {
  if (!fwd.length) return;
  hist.push({node:cur, path:cpath.slice()});
  const s=fwd.pop(); cur=s.node; cpath=s.path; sel=null; selIdx=-1; render();
}

function goUp() {
  if (!cpath.length) return;
  fwd=[];
  hist.push({node:cur, path:cpath.slice()});
  const np=cpath.slice(0,-1);
  cur = np.length ? np[np.length-1].node : TREE;
  cpath=np; sel=null; selIdx=-1; render();
}

function setSort(by) {
  sortBy=by;
  document.getElementById('sn').classList.toggle('on', by==='name');
  document.getElementById('sd').classList.toggle('on', by==='date');
  renderGrid();
}

// ── Render ──
function render() {
  renderBreadcrumb();
  renderGrid();
  updNav();
  updStatus();
  clearPreview();
}

function renderBreadcrumb() {
  const bc=document.getElementById('breadcrumb');
  bc.innerHTML='';
  const add=(text,isLast,fn)=>{
    const s=document.createElement('span');
    s.className='bc-seg'+(isLast?' bc-last':'');
    s.textContent=text;
    if(!isLast) s.onclick=fn;
    bc.appendChild(s);
  };
  const sep=()=>{ const s=document.createElement('span'); s.className='bc-arrow'; s.innerHTML=SEP_SVG; bc.appendChild(s); };
  add('미캔재팬', cpath.length===0, ()=>navTo(TREE,[]));
  cpath.forEach(({name,node},i)=>{
    sep();
    add(name, i===cpath.length-1, ()=>navTo(node, cpath.slice(0,i+1)));
  });
}

function getKids(node) {
  const all=Object.values(node.children||{});
  const dirs=all.filter(v=>v.type==='dir');
  const files=all.filter(v=>v.type==='file');
  const cmp = sortBy==='date'
    ? (a,b)=>(b.mtime||0)-(a.mtime||0)
    : (a,b)=>a.name.localeCompare(b.name,'ja');
  dirs.sort(cmp); files.sort(cmp);
  return [...dirs,...files];
}

function renderGrid() {
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  nodes=getKids(cur);
  nodes.forEach((node,idx)=>{
    const el=document.createElement('div');
    el.className='gi'+(node.archive?' arc':'');
    el.dataset.idx=idx;
    el.innerHTML=
      '<div class="gi-icon">'+(node.type==='dir'?folderSVG(node.name==='pub'):fileSVG(node.ext))+'</div>'+
      '<div class="gi-label">'+esc(node.type==='dir'?node.name:node.display)+'</div>';
    el.addEventListener('click', e=>{ e.stopPropagation(); doSelect(node,idx,el); });
    el.addEventListener('dblclick', e=>{
      e.stopPropagation();
      if(node.type==='dir') navTo(node,[...cpath,{name:node.name,node}]);
      else window.open(node.url,'_blank');
    });
    grid.appendChild(el);
  });
  updStatus();
}

function doSelect(node,idx,el) {
  document.querySelectorAll('.gi.sel').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  sel=node; selIdx=idx;
  updStatus();
  if(node.type==='file') openPreview(node);
  else clearPreview();
}

function updNav() {
  document.getElementById('btn-back').disabled=!hist.length;
  document.getElementById('btn-fwd').disabled=!fwd.length;
  document.getElementById('btn-up').disabled=!cpath.length;
}

function updStatus() {
  const n=nodes.length;
  document.getElementById('st-count').textContent=n+'개 항목';
  document.getElementById('st-sep').style.display=sel?'':'none';
  document.getElementById('st-sel').textContent=sel
    ?(sel.type==='dir'?'📁 '+sel.name:'📄 '+(sel.display+(sel.ext?'.'+sel.ext:'')))
    :'';
}

// ── Preview ──
function clearPreview() {
  document.getElementById('pv-fname').textContent='파일을 선택하세요';
  document.getElementById('pv-urlrow').style.display='none';
  document.getElementById('pv-empty').style.display='flex';
  const fr=document.getElementById('pv-frame');
  fr.style.display='none'; fr.src='';
  document.getElementById('pv-md').style.display='none';
  curUrl=''; curExt='';
}

function openPreview(node) {
  curUrl=node.url; curExt=node.ext;
  document.getElementById('pv-fname').textContent=node.display+(node.ext?'.'+node.ext:'');
  document.getElementById('pv-urltext').textContent=node.url;
  document.getElementById('pv-urlrow').style.display='flex';
  document.getElementById('pv-empty').style.display='none';
  const fr=document.getElementById('pv-frame');
  const md=document.getElementById('pv-md');
  fr.style.display='none'; md.style.display='none';
  if(node.ext==='html'){
    fr.src=node.url; fr.style.display='block';
  } else if(node.ext==='md'){
    md.innerHTML='<p style="color:#bbb;font-size:12px;padding:20px 0">로딩 중...</p>';
    md.style.display='block';
    const raw=node.url
      .replace('https://github.com/','https://raw.githubusercontent.com/')
      .replace('/blob/','/');
    fetch(raw).then(r=>r.text()).then(txt=>{
      md.innerHTML=typeof marked!=='undefined'
        ?marked.parse(txt)
        :'<pre style="white-space:pre-wrap;font-size:12px">'+esc(txt)+'</pre>';
    }).catch(()=>{ md.innerHTML='<p style="color:#ef4444;padding:20px 0">로드 실패</p>'; });
  }
}

function pvCopy() {
  if(!curUrl) return;
  navigator.clipboard.writeText(curUrl).then(()=>{
    const b=document.getElementById('pv-copy');
    b.textContent='✓ 복사됨'; b.className='pv-btn ok';
    setTimeout(()=>{b.textContent='복사';b.className='pv-btn';},1800);
  });
}
function pvNewTab(){ if(curUrl) window.open(curUrl,'_blank'); }

// ── Keyboard ──
document.addEventListener('keydown', e=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  const cols=Math.max(1,Math.floor((document.getElementById('grid-wrap').offsetWidth-20)/90));
  const map={'ArrowRight':1,'ArrowLeft':-1,'ArrowDown':cols,'ArrowUp':-cols};
  if(map[e.key]!==undefined){
    e.preventDefault();
    const next=Math.max(0,Math.min(nodes.length-1,(selIdx<0?0:selIdx)+map[e.key]));
    const els=document.querySelectorAll('.gi');
    if(els[next]) doSelect(nodes[next],next,els[next]);
  } else if(e.key==='Enter'&&sel){
    if(sel.type==='dir') navTo(sel,[...cpath,{name:sel.name,node:sel}]);
    else window.open(sel.url,'_blank');
  } else if(e.key==='Backspace'){ e.preventDefault(); goUp(); }
  else if((e.altKey&&e.key==='ArrowLeft')||e.key==='BrowserBack'){ e.preventDefault(); goBack(); }
  else if((e.altKey&&e.key==='ArrowRight')||e.key==='BrowserForward'){ e.preventDefault(); goFwd(); }
});

// Click empty area → deselect
document.getElementById('grid').addEventListener('click', ()=>{
  document.querySelectorAll('.gi.sel').forEach(x=>x.classList.remove('sel'));
  sel=null; selIdx=-1; updStatus(); clearPreview();
});

// ── Resizer ──
(function(){
  const rz=document.getElementById('resizer');
  const gw=document.getElementById('grid-wrap');
  const fr=document.getElementById('pv-frame');
  let drag=false,sx=0,sw=0;
  rz.addEventListener('mousedown',e=>{
    drag=true;sx=e.clientX;sw=gw.offsetWidth;
    document.body.style.cssText+='cursor:col-resize;user-select:none';
    fr.style.pointerEvents='none';rz.classList.add('drag');e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const nw=Math.max(240,Math.min(sw+e.clientX-sx,window.innerWidth-280));
    gw.style.cssText='flex:none;width:'+nw+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(drag){drag=false;document.body.style.cursor='';document.body.style.userSelect='';
      fr.style.pointerEvents='';rz.classList.remove('drag');}
  });
})();

// ── Init ──
navTo(TREE,[],false);
</script>
