<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캠페인 성과 시각화 — 260604 (2축)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#111827;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 헤더 */
header{background:#1a202e;color:#fff;padding:0 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;height:40px}
header h1{font-size:13px;font-weight:500;color:#f3f4f6;white-space:nowrap}
.header-sub{font-size:11px;color:#4b5563;white-space:nowrap}
.header-sep{color:#2d3748;font-size:12px}
.header-file{margin-left:auto;display:flex;align-items:center;gap:7px}
.file-dot{font-size:9px;line-height:1;flex-shrink:0;transition:color .3s}
.file-name{font-family:ui-monospace,monospace;font-size:11px;color:#4b5563;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-hf{height:26px;padding:0 10px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .12s}
.btn-hf:hover{border-color:rgba(255,255,255,.3);color:#e5e7eb;background:rgba(255,255,255,.05)}
.connect-overlay{position:fixed;inset:0;top:40px;background:rgba(247,248,250,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:100}
.co-title{font-size:14px;font-weight:600;color:#374151}
.co-sub{font-size:12px;color:#9ca3af}
.co-btn{height:32px;padding:0 20px;background:#1a202e;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer}
.co-btn:hover{background:#242d40}

/* 칩 바 + 범례 */
.chip-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:7px 20px;display:flex;gap:4px;flex-shrink:0;align-items:center}
.chip{height:26px;padding:0 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;background:transparent;color:#6b7280;user-select:none;transition:all .12s;display:inline-flex;align-items:center}
.chip:hover{background:#f3f4f6;color:#374151}
.chip.active{background:#1a202e;color:#fff}
.legend{margin-left:auto;font-size:10px;color:#9ca3af;white-space:nowrap}

/* 레이아웃 */
.main{display:grid;grid-template-columns:1.15fr 1fr;flex:1;overflow:hidden}
.panel-left{overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px;border-right:1px solid #e5e7eb;min-height:0;background:#f7f8fa}
.section-box{background:#fff;border-radius:6px;border:1px solid #e5e7eb;overflow:hidden;flex-shrink:0}
.section-title{padding:6px 12px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#374151;background:#fafafa;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:7px}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.t-vpos .tdot,.tdot.t-vpos{background:#34d399}
.t-pos  .tdot,.tdot.t-pos {background:#a7f3d0}
.t-neu  .tdot,.tdot.t-neu {background:#cbd5e1}
.t-neg  .tdot,.tdot.t-neg {background:#fdba74}
.t-vneg .tdot,.tdot.t-vneg{background:#f87171}
.t-na   .tdot,.tdot.t-na  {background:#e5e7eb}

table{width:100%;border-collapse:collapse;table-layout:fixed}
col.c-camp{width:46px} col.c-mail{width:auto} col.c-ax{width:84px} col.c-n{width:78px}
thead th{font-size:10px;color:#9ca3af;text-transform:uppercase;padding:4px 10px;background:#fafafa;border-bottom:1px solid #f3f4f6;text-align:center;font-weight:600;letter-spacing:.3px}
thead th:first-child,thead th:nth-child(2){text-align:left}
tbody tr.mail-row{border-left:3px solid transparent;cursor:grab}
tbody tr.mail-row:hover td{background:rgba(0,0,0,.018)}
tbody tr.dragging-row{opacity:.25}
tbody td{padding:4px 10px;font-size:12px;vertical-align:middle;border-bottom:1px solid #f5f6f8;color:#374151}
.b-vpos{border-left-color:#34d399!important}
.b-pos {border-left-color:#a7f3d0!important}
.b-neu {border-left-color:#e5e7eb!important}
.b-neg {border-left-color:#fdba74!important}
.b-vneg{border-left-color:#f87171!important}
.b-na  {border-left-color:#e5e7eb!important}
.mail-name{font-weight:500;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.camp-tag{font-size:10px;color:#9ca3af}
.seq-tag{display:inline-block;font-size:9px;font-weight:700;color:#6366f1;background:#eef2ff;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:1px}
.td-ax{text-align:center;white-space:nowrap}
.ax-sym{font-size:13px}
.ax-lift{font-size:10px;margin-left:3px;font-weight:600}
.pos{color:#059669}.neg{color:#dc2626}.zero{color:#9ca3af}
.td-n{text-align:right;font-size:10px;color:#9ca3af}
.n-warn{color:#d97706;font-weight:600}.n-crit{color:#dc2626;font-weight:600}
.ctrl-n{color:#d1d5db;font-size:9px}
.empty-msg{padding:10px 12px;font-size:11px;color:#d1d5db;font-style:italic}

/* 상세 행 */
tr.detail-row td{background:#fafbfc;padding:8px 12px 10px}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.det-box h4{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#9ca3af;margin-bottom:4px}
.det-table{width:100%}
.det-table td{padding:1.5px 4px;font-size:11px;border:none;color:#4b5563}
.det-table td.dv{text-align:right;font-family:ui-monospace,monospace;font-size:10.5px}
.det-ref{font-size:10px;color:#9ca3af;margin-top:5px}
.primary-mark{color:#6366f1;font-weight:700}

/* 시퀀스 카드 펼침 */
tr.sub-row td{background:#fbfbfd;padding-left:18px}
tr.sub-row{cursor:grab;border-left:3px solid #c7d2fe}
.sub-name{font-size:11.5px;color:#374151}
.btn-addall{height:20px;padding:0 8px;border:1px solid #c7d2fe;border-radius:5px;background:#eef2ff;color:#4f46e5;font-size:10px;cursor:pointer}
.btn-addall:hover{background:#e0e7ff}
.expander{cursor:pointer;color:#9ca3af;font-size:10px;user-select:none}

/* 우측 */
.panel-right{overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;min-height:0;background:#fff}
.right-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
.right-header h3{font-size:12px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.4px}
.right-actions{display:flex;gap:6px;align-items:center}
.btn-save,.btn-reset{height:26px;padding:0 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;border:1px solid transparent;white-space:nowrap}
.btn-save{background:#1a202e;color:#fff;border-color:#1a202e}
.btn-save:hover:not(:disabled){background:#242d40}
.btn-save:disabled{opacity:.2;cursor:default;pointer-events:none}
.btn-reset{background:#f9fafb;color:#6b7280;border-color:#e5e7eb}
.btn-reset:hover{background:#f3f4f6;border-color:#d1d5db;color:#374151}
.save-toast{font-size:11px;color:#059669;font-weight:500;opacity:0;transition:opacity .3s;white-space:nowrap}
.save-toast.show{opacity:1}
.right-note{font-size:11px;color:#9ca3af}
.drag-list{display:flex;flex-direction:column;gap:4px}
.drag-card{background:#fff;border-radius:6px;border:1px solid #e5e7eb;border-left:3px solid #e5e7eb;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:grab;user-select:none;transition:border-color .12s,box-shadow .12s}
.drag-card:hover{border-color:#d1d5db;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.drag-card.dragging{opacity:.25}
.drag-handle{color:#d1d5db;font-size:14px;flex-shrink:0}
.drag-seq{width:18px;height:18px;background:#374151;color:#fff;border-radius:4px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drag-info{flex:1;min-width:0}
.drag-mail{font-size:12px;font-weight:500;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drag-camp{font-size:10px;color:#9ca3af;margin-top:1px}
.drag-grade{font-size:12px;white-space:nowrap}
.drag-remove{background:none;border:none;color:#d1d5db;font-size:14px;cursor:pointer;padding:2px 3px;line-height:1;flex-shrink:0;border-radius:4px}
.drag-remove:hover{color:#ef4444}
.drag-placeholder{height:2px;background:#818cf8;border-radius:1px;flex-shrink:0;pointer-events:none}
.empty-drop{border:1.5px dashed #e5e7eb;border-radius:6px;padding:24px;text-align:center;font-size:12px;color:#d1d5db;transition:all .12s}
.empty-drop.over{border-color:#818cf8;background:#f5f3ff;color:#6366f1}
</style>
</head>
<body>

<header>
  <h1>캠페인 성과 시각화</h1>
  <span class="header-sep">·</span>
  <span class="header-sub">2026-06-04 재집계 (파이프라인 수정판) | 활성 × 리텐션 2축</span>
  <div class="header-file">
    <span class="file-dot" id="fileDot" style="color:#374151">●</span>
    <span class="file-name" id="fileName">미연결</span>
    <button class="btn-hf" id="btnConnect" onclick="handleFileBtn()">파일 선택</button>
  </div>
</header>

<div class="chip-bar" id="chipBar"></div>

<div id="connectOverlay" class="connect-overlay">
  <p class="co-title">데이터 파일 연결 필요</p>
  <p class="co-sub">로컬의 crm_seq_data_260604.json 파일을 선택하세요 (결과지표 + 구성안 통합본)</p>
  <button class="co-btn" onclick="handleFileBtn()">파일 선택</button>
</div>

<div class="main">
  <div class="panel-left" id="panelLeft"></div>
  <div class="panel-right" id="panelRight"></div>
</div>

<script>
// ===== 표시/데이터 상수 =====
const SEGS = ['NULL','STUDENT','COMPANY','INDIVIDUAL','EDUCATION','BUSINESS','INSTITUTION'];
const segKey = s => s==='NULL' ? '_NULL_' : s;   // 표시명 ↔ JSON 키
const SEQ_MAILS = {
  JA_SERIES:  ['4step_empathy','aip_curiosity','font','bgremove','table','graph','templatemix','bookmark'],
  EDU_SERIES: ['edu01_class','edu02_quiz','edu03_character'],
};
const RET_SECTIONS = [
  {sym:'◎', title:'리텐션 검증 (z≥2)',        cls:'t-vpos', b:'b-vpos'},
  {sym:'○', title:'리텐션 양의 신호',          cls:'t-pos',  b:'b-pos'},
  {sym:'−', title:'중립',                      cls:'t-neu',  b:'b-neu'},
  {sym:'△', title:'리텐션 음의 신호',          cls:'t-neg',  b:'b-neg'},
  {sym:'✕', title:'리텐션 역효과 검증 (z≤−2)', cls:'t-vneg', b:'b-vneg'},
  {sym:'?', title:'측정 불가',                 cls:'t-na',   b:'b-na'},
];
const ACT_LABELS = {lr24:'로그인 24h',lr72:'로그인 72h',lr168:'로그인 168h ★',l168ge2:'로그인 2일+ (168h)',dr24:'디자인 24h',dr72:'디자인 72h',dr168:'디자인 168h',d168ge2:'디자인 2개+ (168h)'};
const RET_LABELS = {postw1_login:'post-W1 재로그인 ★',postw1_design:'post-W1 재디자인',lo_w1:'로그인 W1 (8~14일)',lo_bw1:'로그인 BW1 (15~28일)',dl_w1:'다운로드 W1',dl_bw1:'다운로드 BW1',ds_w1:'디자인 W1',ds_bw1:'디자인 BW1',lo_2860:'로그인 28~60일'};
const SYM_RANK = {'◎':0,'○':1,'−':2,'△':3,'✕':4,'?':5};

let DATA = null;          // 전체 JSON {meta, results, plan}
let currentSeg = 'NULL';

// ===== 파일 연결 (File System Access) =====
let fh = null, permOK = false;
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('crm_fh2',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('fh');r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}
async function idbGet(k){const db=await idbOpen();return new Promise(res=>{const r=db.transaction('fh','readonly').objectStore('fh').get(k);r.onsuccess=e=>res(e.target.result||null);r.onerror=()=>res(null);});}
async function idbSet(k,v){const db=await idbOpen();return new Promise(res=>{const tx=db.transaction('fh','readwrite');tx.objectStore('fh').put(v,k);tx.oncomplete=res;});}

function setConnected(ok){
  permOK = ok;
  document.getElementById('connectOverlay').style.display = ok ? 'none' : 'flex';
  updateFileStatus();
}
function updateFileStatus(){
  const dot=document.getElementById('fileDot'),name=document.getElementById('fileName'),btn=document.getElementById('btnConnect');
  if(fh&&permOK){dot.style.color='#22c55e';name.textContent=fh.name;btn.textContent='변경';}
  else if(fh){dot.style.color='#f59e0b';name.textContent=fh.name+' — 재연결 필요';btn.textContent='재연결';}
  else{dot.style.color='#374151';name.textContent='미연결';btn.textContent='파일 선택';}
}
async function loadFromFile(){
  const file=await fh.getFile();
  const parsed=JSON.parse(await file.text());
  if(!parsed.results||!parsed.plan){
    alert('형식이 다릅니다. crm_seq_data_260604.json(결과지표+구성안 통합본)을 선택하세요.\n(구 crm_seq_config.json은 이미 plan으로 마이그레이션되어 있습니다)');
    throw new Error('bad format');
  }
  if(!parsed.plan.main_track) parsed.plan.main_track={};
  DATA=parsed;
  // localStorage 임시 캐시 복원(저장 전 크래시 대비)
  SEGS.forEach(s=>{try{const c=localStorage.getItem('crm_seq2_'+s);if(c){const v=JSON.parse(c);if(v&&v.length&&!(DATA.plan.main_track[s]||[]).length)DATA.plan.main_track[s]=v;}}catch{}});
}
async function saveToFile(){
  if(!fh||!permOK)return false;
  try{const w=await fh.createWritable();await w.write(JSON.stringify(DATA,null,1));await w.close();return true;}
  catch(e){setConnected(false);return false;}
}
async function handleFileBtn(){
  if(!window.showOpenFilePicker){alert('Chrome 필요');return;}
  try{
    if(fh&&!permOK){
      const p=await fh.requestPermission({mode:'readwrite'});
      if(p==='granted'){await loadFromFile();setConnected(true);refresh();}
      return;
    }
    const [h]=await window.showOpenFilePicker({types:[{description:'CRM 데이터 JSON',accept:{'application/json':['.json']}}],multiple:false});
    fh=h;await idbSet('data',h);
    const p=await h.requestPermission({mode:'readwrite'});
    if(p==='granted'){await loadFromFile();setConnected(true);refresh();}
  }catch(e){if(e.name!=='AbortError')console.error(e);}
}
async function tryRestore(){
  const h=await idbGet('data');
  if(!h)return;
  fh=h;
  try{const p=await h.queryPermission({mode:'readwrite'});
    if(p==='granted'){await loadFromFile();setConnected(true);return;}}catch{}
  updateFileStatus();
}

// ===== dirty =====
const dirtySegs=new Set();
function markDirty(){dirtySegs.add(currentSeg);updateSaveBtn();}
function markClean(s){dirtySegs.delete(s===undefined?currentSeg:s);updateSaveBtn();}
function updateSaveBtn(){const b=document.getElementById('btnSave');if(b)b.disabled=!dirtySegs.has(currentSeg);}

// ===== 유틸 =====
function campLabel(c){return c.replace('JA_SERIES','JAS').replace('EDU_SERIES','EDU')}
function pct(v){return v==null?'—':((v>0?'+':'')+(v*100).toFixed(1))}
function liftCls(v){return v==null?'zero':v>0.0005?'pos':v<-0.0005?'neg':'zero'}
function flagTag(f){return f?(' '+f):''}
function nCls(n){return n<30?'n-crit':n<80?'n-warn':''}
function segCards(seg){
  const k=segKey(seg);
  return DATA.results.cards.filter(c=>c.by_seg[k]).map(c=>({card:c,g:c.by_seg[k]}));
}
function gradeStr(g){return g.grade.act+g.grade.ret;}

// ===== 칩 =====
function renderChips(){
  document.getElementById('chipBar').innerHTML =
    SEGS.map(s=>`<div class="chip${s===currentSeg?' active':''}" onclick="selectSeg('${s}')">${s}</div>`).join('') +
    `<span class="legend">표기: 활성·리텐션 기호 — ◎ z≥2 · ○ 0.5≤z<2 · − 중립 · △ 음신호 · ✕ z≤−2 · ⚠ ctrl<80 · 🔴 ctrl<30 · ★=대표지표 · 행 클릭=상세</span>`;
}
function selectSeg(seg){
  const list=document.getElementById('dragList');
  if(list&&DATA)DATA.plan.main_track[currentSeg]=currentIds();
  currentSeg=seg;
  renderChips();renderLeft();renderRight();
}
function refresh(){renderChips();renderLeft();renderRight();}

// ===== 좌측: 리텐션 등급순 단일 그리드 =====
function renderLeft(){
  const panel=document.getElementById('panelLeft');
  if(!DATA){panel.innerHTML='';return;}
  const items=segCards(currentSeg);
  // 섹션: 리텐션 기호 기준, 섹션 내 정렬: 활성 기호 → 리텐션 z desc
  const html=RET_SECTIONS.map(sec=>{
    const rows=items.filter(it=>it.g.grade.ret===sec.sym)
      .sort((a,b)=>{
        const r=SYM_RANK[a.g.grade.act]-SYM_RANK[b.g.grade.act];
        if(r!==0)return r;
        return (b.g.ret.postw1_login.z??-99)-(a.g.ret.postw1_login.z??-99);
      });
    if(!rows.length)return '';
    return buildSection(sec,rows);
  }).filter(Boolean).join('');
  panel.innerHTML=html||'<div class="empty-msg">데이터 없음</div>';
}

function buildSection(sec,rows){
  const body=`<table><colgroup><col class="c-camp"><col class="c-mail"><col class="c-ax"><col class="c-ax"><col class="c-n"></colgroup>
    <thead><tr><th>캠페인</th><th>메일</th><th>활성 (lift%p)</th><th>리텐션 (lift%p)</th><th>모수</th></tr></thead>
    <tbody>${rows.map(it=>rowHTML(it,sec)).join('')}</tbody></table>`;
  return `<div class="section-box"><div class="section-title"><span class="tdot ${sec.cls}"></span>${sec.sym} ${sec.title}</div>${body}</div>`;
}

function rowHTML(it,sec){
  const c=it.card,g=it.g;
  const id=c.id, isSeq=c.type==='seq';
  const name=isSeq?campLabel(c.campaign)+' 시퀀스':c.mail;
  const act=g.act.lr168,ret=g.ret.postw1_login;
  const detId='det_'+id.replace(/[^a-zA-Z0-9]/g,'_');
  let html=`<tr class="mail-row ${sec.b}" ${isSeq?'':'draggable="true"'} data-id="${id}"
    ${isSeq?'':`ondragstart="onRowDragStart(event,'${id}')" ondragend="onRowDragEnd(event)"`}
    onclick="toggleDetail('${detId}')">
    <td class="camp-tag">${campLabel(c.campaign)}</td>
    <td><div class="mail-name">${name}${isSeq?`<span class="seq-tag">SEQ ${SEQ_MAILS[c.campaign].length}통</span> <span class="expander" onclick="event.stopPropagation();toggleSub('${c.campaign}')">▾ 구성</span>`:''}</div></td>
    <td class="td-ax"><span class="ax-sym">${g.grade.act}</span><span class="ax-lift ${liftCls(act.lift)}">${pct(act.lift)}</span>${flagTag(g.grade.act_flag)}</td>
    <td class="td-ax"><span class="ax-sym">${g.grade.ret}</span><span class="ax-lift ${liftCls(ret.lift)}">${pct(ret.lift)}</span>${flagTag(g.grade.ret_flag)}</td>
    <td class="td-n ${nCls(g.nC)}">n=${g.nT.toLocaleString()}<div class="ctrl-n">ctrl ${g.nC} / 성숙 ${g.nC_mat}</div></td>
  </tr>
  <tr class="detail-row" id="${detId}" style="display:none"><td colspan="5">${detailHTML(g,isSeq)}</td></tr>`;
  if(isSeq) html+=subRows(c.campaign);
  return html;
}

function detailHTML(g,isSeq){
  const mk=(obj,labels)=>Object.entries(labels).map(([k,lab])=>{
    const m=obj[k];if(!m)return '';
    const star=lab.includes('★');
    return `<tr><td${star?' class="primary-mark"':''}>${lab.replace(' ★','')}${star?' ★':''}</td>
      <td class="dv ${liftCls(m.lift)}">${pct(m.lift)}%p</td>
      <td class="dv zero">z=${m.z==null?'—':m.z}</td></tr>`;
  }).join('');
  const ref=g.ref&&g.ref.open!=null?`<div class="det-ref">참고(발송군만): 오픈 ${(g.ref.open*100).toFixed(1)}% · 클릭 ${(g.ref.click*100).toFixed(1)}%${isSeq?' (첫 메일 기준)':''}</div>`:'';
  return `<div class="det-grid">
    <div class="det-box"><h4>활성 (첫 발송 ~7일)</h4><table class="det-table">${mk(g.act,ACT_LABELS)}</table></div>
    <div class="det-box"><h4>리텐션 (8일~, 성숙코호트 n=${g.nT_mat}/${g.nC_mat})</h4><table class="det-table">${mk(g.ret,RET_LABELS)}</table></div>
  </div>${ref}`;
}

function subRows(camp){
  const mails=SEQ_MAILS[camp]||[];
  return `<tr class="sub-row sub-head-${camp}" style="display:none"><td colspan="5" style="padding-left:12px">
      <button class="btn-addall" onclick="event.stopPropagation();addAll('${camp}')">시퀀스 전체를 구성안에 추가 →</button>
      <span style="font-size:10px;color:#9ca3af;margin-left:8px">개별 메일도 드래그 가능 (등급은 시퀀스 단위 — 메일별 등급 없음)</span>
    </td></tr>` +
    mails.map(m=>{
      const id=camp+'|'+m;
      return `<tr class="sub-row sub-of-${camp}" style="display:none" draggable="true" data-id="${id}"
        ondragstart="onRowDragStart(event,'${id}')" ondragend="onRowDragEnd(event)">
        <td class="camp-tag">└</td><td colspan="4"><span class="sub-name">${m}</span></td>
      </tr>`;
    }).join('');
}
function toggleSub(camp){
  document.querySelectorAll(`.sub-of-${camp}, .sub-head-${camp}`).forEach(tr=>{
    tr.style.display=tr.style.display==='none'?'':'none';
  });
}
function toggleDetail(id){
  const tr=document.getElementById(id);
  if(tr)tr.style.display=tr.style.display==='none'?'':'none';
}
function addAll(camp){
  (SEQ_MAILS[camp]||[]).forEach(m=>addCardEnd(camp+'|'+m));
}

// ===== 드래그 =====
let dragType=null,dragId=null,dragCard=null,ph=null;
function makePH(){const d=document.createElement('div');d.className='drag-placeholder';return d;}
function removePH(){if(ph&&ph.parentNode)ph.parentNode.removeChild(ph);ph=null;}
function getInsertBefore(list,y){
  const cards=[...list.querySelectorAll('.drag-card:not(.dragging)')];
  for(const c of cards){const r=c.getBoundingClientRect();if(y<r.top+r.height*.5)return c;}
  return null;
}
function movePH(list,y){if(!ph)ph=makePH();const b=getInsertBefore(list,y);if(b)list.insertBefore(ph,b);else list.appendChild(ph);}
function onRowDragStart(e,id){dragType='row';dragId=id;e.dataTransfer.effectAllowed='copy';e.currentTarget.classList.add('dragging-row');}
function onRowDragEnd(e){e.currentTarget.classList.remove('dragging-row');removePH();dragType=null;dragId=null;}

// ===== 우측 구성안 =====
function planItems(seg){
  const order=(DATA.plan.main_track[seg]||[]);
  return order;
}
function itemInfo(id){
  // id = "CAMPAIGN|mail" — 시퀀스 메일은 카드(시퀀스) 등급을 빌려 표시
  const [camp,mail]=id.split('|');
  const k=segKey(currentSeg);
  let card=DATA.results.cards.find(c=>c.id===id);           // 단발
  let isSeqMail=false;
  if(!card){card=DATA.results.cards.find(c=>c.id===camp&&c.type==='seq');isSeqMail=!!card;}
  const g=card?card.by_seg[k]:null;
  return {camp,mail,g,isSeqMail};
}
function renderRight(){
  const panel=document.getElementById('panelRight');
  if(!DATA){panel.innerHTML='';return;}
  const items=planItems(currentSeg);
  panel.innerHTML=`
    <div class="right-header">
      <h3>구성안 — ${currentSeg}</h3>
      <div class="right-actions">
        <span class="save-toast" id="toast">저장됨 ✓</span>
        <button class="btn-reset" onclick="resetOrder()">비우기</button>
        <button class="btn-save" id="btnSave" onclick="doSave()" disabled>저장</button>
      </div>
    </div>
    <div class="right-note">좌측 행(단발) 또는 시퀀스 ▾구성의 메일을 끌어다 배치 · 저장 시 JSON의 plan에 기록 (결과지표는 불변)</div>
    <div class="drag-list" id="dragList">${items.map((id,i)=>makeCard(id,i+1)).join('')}</div>
    <div class="empty-drop" id="emptyDrop" style="${items.length?'display:none':''}">좌측에서 메일을 끌어다 놓으세요</div>`;
  initCardDrag();initEmptyDrop();updateSaveBtn();
}
function makeCard(id,seq){
  const {camp,mail,g,isSeqMail}=itemInfo(id);
  const grade=g?`<span class="drag-grade" title="활성×리텐션${isSeqMail?' (시퀀스 단위)':''}">${g.grade.act}${g.grade.ret}${g.grade.ret_flag||''}</span>`:'<span class="drag-grade zero">·</span>';
  return `<div class="drag-card" draggable="true" data-id="${id}">
    <span class="drag-handle">⠿</span><span class="drag-seq">${seq}</span>
    <div class="drag-info"><div class="drag-mail">${mail||camp}</div><div class="drag-camp">${campLabel(camp)}${isSeqMail?' 시퀀스':''}</div></div>
    ${grade}
    <button class="drag-remove" onclick="removeCard('${id.replace(/'/g,"\\'")}')" title="제거">×</button>
  </div>`;
}
function addCardEnd(id){
  const list=document.getElementById('dragList');
  if(!list||list.querySelector(`[data-id="${CSS.escape(id)}"]`))return;
  const seq=list.querySelectorAll('.drag-card').length+1;
  list.insertAdjacentHTML('beforeend',makeCard(id,seq));
  bindNewCards(list);updateSeqNums();syncEmptyDrop();markDirty();
}
function removeCard(id){
  const card=document.querySelector(`#dragList [data-id="${CSS.escape(id)}"]`);
  if(card){card.remove();updateSeqNums();syncEmptyDrop();markDirty();}
}
function syncEmptyDrop(){
  const list=document.getElementById('dragList'),ed=document.getElementById('emptyDrop');
  if(ed)ed.style.display=list.querySelectorAll('.drag-card').length?'none':'';
}
function initEmptyDrop(){
  const ed=document.getElementById('emptyDrop');if(!ed)return;
  ed.addEventListener('dragover',e=>{if(dragType==='row'){e.preventDefault();ed.classList.add('over');}});
  ed.addEventListener('dragleave',()=>ed.classList.remove('over'));
  ed.addEventListener('drop',e=>{e.preventDefault();ed.classList.remove('over');
    if(dragType==='row'&&dragId){addCardEnd(dragId);dragType=null;dragId=null;}});
}
function initCardDrag(){
  const list=document.getElementById('dragList');
  if(!list.dataset.listInit){
    list.dataset.listInit='1';
    list.addEventListener('dragover',e=>{e.preventDefault();movePH(list,e.clientY);});
    list.addEventListener('dragleave',e=>{if(!list.contains(e.relatedTarget))removePH();});
    list.addEventListener('drop',e=>{
      e.preventDefault();
      if(!ph){dragType=null;dragCard=null;dragId=null;return;}
      if(dragType==='card'&&dragCard){list.insertBefore(dragCard,ph);dragCard.classList.remove('dragging');}
      else if(dragType==='row'&&dragId&&!list.querySelector(`[data-id="${CSS.escape(dragId)}"]`)){
        const seq=list.querySelectorAll('.drag-card').length+1;
        ph.insertAdjacentHTML('beforebegin',makeCard(dragId,seq));
        bindNewCards(list);
      }
      removePH();updateSeqNums();syncEmptyDrop();markDirty();
      dragType=null;dragCard=null;dragId=null;
    });
  }
  bindNewCards(list);
}
function bindNewCards(list){
  list.querySelectorAll('.drag-card').forEach(card=>{
    if(card.dataset.initDrag)return;
    card.dataset.initDrag='1';
    card.addEventListener('dragstart',e=>{dragType='card';dragCard=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');removePH();updateSeqNums();dragType=null;dragCard=null;});
  });
}
function updateSeqNums(){document.querySelectorAll('#dragList .drag-seq').forEach((el,i)=>el.textContent=i+1);}
function currentIds(){return [...document.querySelectorAll('#dragList .drag-card')].map(c=>c.dataset.id);}

async function doSave(){
  DATA.plan.main_track[currentSeg]=currentIds();
  localStorage.setItem('crm_seq2_'+currentSeg,JSON.stringify(DATA.plan.main_track[currentSeg]));
  const ok=await saveToFile();
  if(ok){markClean(currentSeg);localStorage.removeItem('crm_seq2_'+currentSeg);}
  const t=document.getElementById('toast');
  t.textContent=ok?'저장됨 ✓':'저장 실패 ⚠';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);
}
function resetOrder(){
  DATA.plan.main_track[currentSeg]=[];
  localStorage.removeItem('crm_seq2_'+currentSeg);
  renderRight();markDirty();
}

// ===== 초기화 =====
(async()=>{
  await tryRestore();
  renderChips();
  if(DATA)refresh();
})();
</script>
