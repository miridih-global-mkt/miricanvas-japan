<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM 메일 빌더</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header id="topbar">
    <button id="sidebar-toggle" title="메일 목록 접기/펼치기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <line x1="9" y1="4" x2="9" y2="20"/>
        <path d="M16 15l-3-3 3-3"/>
      </svg>
    </button>
    <button data-tab="editor" class="tab active">편집 <span class="tab-badge tab-badge-editor off">off</span></button>
    <button data-tab="compare" class="tab">비교 <span class="tab-badge tab-badge-compare count">0</span></button>
  </header>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-content">
        <ul id="mail-list"></ul>
      </div>
      <button id="new-mail-btn" class="primary sidebar-new-btn">+ 신규 메일 작성</button>
    </aside>
    <main id="main">
      <section id="tab-content"></section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
