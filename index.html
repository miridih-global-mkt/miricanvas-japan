<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>미캔재팬</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;
  color:#333;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#fff}

/* ── Topbar ── */
#topbar{display:flex;align-items:center;gap:10px;padding:0 16px;
  background:#fff;border-bottom:1px solid #d8d8d8;height:48px;flex-shrink:0}
#topbar h1{font-size:13.5px;font-weight:600;color:#444;letter-spacing:.02em}
#mob-back{display:none;border:none;background:none;font-size:20px;
  cursor:pointer;color:#555;padding:0 4px;line-height:1;flex-shrink:0}

/* ── Main split ── */
#main{display:flex;flex:1;min-height:0;overflow:hidden}

/* ── Miller columns ── */
#miller-wrap{flex:0 0 auto;width:52%;min-width:250px;
  overflow-x:auto;overflow-y:hidden;display:flex;height:100%;background:#f8f8f8}
#miller{display:flex;height:100%;width:100%}
.col{flex:0 1 250px;min-width:140px;height:100%;overflow-y:auto;
  background:#fff;border-right:1px solid #e8e8e8}
.col:first-child{background:#f8f8f8}
.col:last-child{flex-grow:1}
.item{display:flex;align-items:center;gap:8px;padding:8px 12px;
  cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:12.5px;
  line-height:1.4;transition:background .1s}
.item:hover{background:#eef2ff}
.item.sel{background:#dde7ff;font-weight:500}
.item.arc{opacity:.38;font-style:italic}
.item.pub-dir{font-weight:500;border-bottom:1px solid #d8d8d8;margin-bottom:2px}
.ic-dir{font-size:15px;flex-shrink:0;line-height:1}
.ic-file{display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:17px;border-radius:3px;font-size:8px;font-weight:700;
  flex-shrink:0;letter-spacing:.3px;font-family:ui-monospace,monospace}
.ic-html{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
.ic-md  {background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.ic-etc {background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.nm{flex:1;word-break:break-all;min-width:0}
.ar{font-size:11px;color:#ccc;flex-shrink:0;margin-left:auto;padding-left:2px}

/* ── Resizer ── */
#resizer{flex:0 0 5px;cursor:col-resize;background:#e8e8e8;
  transition:background .15s;flex-shrink:0;position:relative}
#resizer::after{content:'';position:absolute;top:0;bottom:0;
  left:-5px;right:-5px}
#resizer:hover,#resizer.drag{background:#94a3b8}

/* ── Preview panel ── */
#preview{flex:1;min-width:0;display:flex;flex-direction:column;background:#fff}
#pv-bar{display:flex;flex-direction:column;justify-content:center;gap:4px;
  padding:7px 12px;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0}
#pv-name{font-size:12.5px;font-weight:500;color:#374151;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
#pv-url-row{display:flex;align-items:center;gap:6px;min-width:0}
#pv-url-text{flex:1;font-size:10.5px;color:#9ca3af;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,monospace;min-width:0}
.pv-btn{border:1px solid #d1d5db;background:#f9fafb;border-radius:5px;
  font-size:10.5px;padding:2px 8px;cursor:pointer;color:#374151;
  white-space:nowrap;flex-shrink:0;transition:background .1s}
.pv-btn:hover{background:#f3f4f6}
.pv-btn.ok{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
#pv-body{flex:1;position:relative;overflow:hidden}
#pv-empty{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;color:#e0e0e0;font-size:12px;pointer-events:none;
  user-select:none}
#pv-frame{width:100%;height:100%;border:none;display:none}
#pv-md{padding:32px 36px;overflow-y:auto;height:100%;display:none;
  font-size:13.5px;line-height:1.75;color:#374151;background:#fff}
#pv-md h1,#pv-md h2,#pv-md h3{margin:1.1em 0 .4em;font-weight:600;color:#111}
#pv-md h1{font-size:1.3em;border-bottom:1px solid #f0f0f0;padding-bottom:.3em}
#pv-md h2{font-size:1.1em}#pv-md h3{font-size:1em}
#pv-md p{margin:.5em 0}
#pv-md ul,#pv-md ol{margin:.4em 0 .4em 1.5em}
#pv-md li{margin:.2em 0}
#pv-md code{background:#f3f4f6;border-radius:3px;padding:1px 5px;
  font-size:.88em;font-family:ui-monospace,monospace}
#pv-md pre{background:#f3f4f6;border-radius:6px;padding:12px 14px;
  overflow-x:auto;margin:.6em 0}
#pv-md pre code{background:none;padding:0}
#pv-md a{color:#2563eb}
#pv-md hr{border:none;border-top:1px solid #e5e7eb;margin:1em 0}
#pv-md blockquote{border-left:3px solid #e5e7eb;padding:.2em .8em;
  color:#6b7280;font-style:italic;margin:.5em 0}
#pv-md table{border-collapse:collapse;margin:.6em 0;font-size:.95em;width:100%}
#pv-md th,#pv-md td{border:1px solid #e5e7eb;padding:6px 10px;text-align:left}
#pv-md th{background:#f9fafb;font-weight:600}
#pv-md tr:nth-child(even) td{background:#fafafa}

/* ── Mobile ── */
@media(max-width:800px){
  #miller-wrap{flex:0 0 100%!important;width:100%!important}
  #resizer{display:none}
  #preview{display:none;position:fixed;inset:0;z-index:100;background:#fff;border:none}
  #preview.mob-open{display:flex}
  #mob-back.vis{display:block}
}</style>
</head>

</div>

const T=TREE;
let cc=0,ms=[],curUrl='',curExt='';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fileIcon(ext){
  if(ext==='html')return '<span class="ic-file ic-html">HTML</span>';
  if(ext==='md')  return '<span class="ic-file ic-md">MD</span>';
  return '<span class="ic-file ic-etc">'+esc((ext||'').toUpperCase().slice(0,4))+'</span>';
}

function mkCol(node,idx){
  const col=document.createElement('div');
  col.className='col';col.id='c'+idx;
  const kids=Object.values(node.children||{});
  kids.sort((a,b)=>{
    if(a.name==='pub')return -1;
    if(b.name==='pub')return 1;
    if(a.type!==b.type)return a.type==='dir'?-1:1;
    return a.name.localeCompare(b.name,'ja');
  });
  for(const k of kids){
    const d=document.createElement('div');
    const isPub=(k.type==='dir'&&k.name==='pub');
    d.className='item'+(k.archive?' arc':'')+(isPub?' pub-dir':'');
    if(k.type==='dir'){
      d.innerHTML='<span class="ic-dir">'+(isPub?'📤':'📁')+'</span>'
        +'<span class="nm">'+esc(k.name)+'</span>'
        +'<span class="ar">›</span>';
      d.onclick=()=>openDir(k,d,idx);
    }else{
      d.innerHTML=fileIcon(k.ext)+'<span class="nm">'+esc(k.display)+'</span>';
      d.onclick=()=>openFile(k);
    }
    col.appendChild(d);
  }
  return col;
}

function openDir(node,el,fromIdx){
  document.getElementById('c'+fromIdx).querySelectorAll('.sel').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  const m=document.getElementById('miller');
  m.querySelectorAll('.col').forEach(c=>{if(+c.id.slice(1)>fromIdx)c.remove()});
  cc=fromIdx+1;
  const nc=mkCol(node,cc++);
  m.appendChild(nc);
  setTimeout(()=>nc.scrollIntoView({behavior:'smooth',block:'nearest',inline:'end'}),30);
  if(window.innerWidth<=800)mobPushDir(nc,node.name);
}

function openFile(k){
  curUrl=k.url; curExt=k.ext;
  document.getElementById('pv-name').textContent=k.display+(k.ext?'.'+k.ext:'');
  document.getElementById('pv-url-text').textContent=k.url;
  document.getElementById('pv-url-row').style.display='flex';
  document.getElementById('pv-copy').textContent='복사'; document.getElementById('pv-copy').className='pv-btn';
  const pvEmpty=document.getElementById('pv-empty');
  const pvFrame=document.getElementById('pv-frame');
  const pvMd=document.getElementById('pv-md');
  pvEmpty.style.display='none'; pvFrame.style.display='none'; pvMd.style.display='none';
  if(k.ext==='html'){
    pvFrame.src=k.url; pvFrame.style.display='block';
  }else if(k.ext==='md'){
    pvMd.innerHTML='<p style="color:#9ca3af;font-size:12px">로딩 중...</p>';
    pvMd.style.display='block';
    const rawUrl=k.url
      .replace('https://github.com/','https://raw.githubusercontent.com/')
      .replace('/blob/','/ ').split('/ ').join('/');
    fetch(rawUrl).then(r=>r.text()).then(txt=>{
      pvMd.innerHTML=typeof marked!=='undefined'
        ?marked.parse(txt)
        :'<pre style="white-space:pre-wrap;font-size:12px">'+esc(txt)+'</pre>';
    }).catch(()=>{pvMd.innerHTML='<p style="color:#ef4444">로드 실패</p>';});
  }
  if(window.innerWidth<=800){
    document.getElementById('preview').classList.add('mob-open');
    ms.push({id:null,title:k.display,isFile:true});
    updMob();
  }
}

function pvCopy(){
  if(!curUrl)return;
  navigator.clipboard.writeText(curUrl).then(()=>{
    const btn=document.getElementById('pv-copy');
    btn.textContent='✓ 복사됨!'; btn.className='pv-btn ok';
    setTimeout(()=>{btn.textContent='복사'; btn.className='pv-btn';},1800);
  });
}

function pvNewTab(){ if(curUrl)window.open(curUrl,'_blank'); }

function mobPushDir(nc,title){
  document.getElementById('miller').querySelectorAll('.col').forEach(c=>c.classList.remove('mact'));
  nc.classList.add('mact');
  ms.push({id:nc.id,title,isFile:false});
  updMob();
}

function mobBack(){
  if(!ms.length)return;
  const top=ms.pop();
  if(top.isFile){
    document.getElementById('preview').classList.remove('mob-open');
  }else{
    const m=document.getElementById('miller');
    m.querySelectorAll('.col').forEach(c=>c.classList.remove('mact'));
    document.getElementById(ms.length?ms[ms.length-1].id:'c0').classList.add('mact');
  }
  updMob();
}

function updMob(){
  const b=document.getElementById('mob-back'),t=document.getElementById('page-title');
  if(ms.length){b.classList.add('vis');t.textContent=ms[ms.length-1].title;}
  else{b.classList.remove('vis');t.textContent='미캔재팬';}
}

(function(){
  const m=document.getElementById('miller');
  const c0=mkCol(T,0);c0.id='c0';c0.classList.add('mact');
  m.appendChild(c0);cc=1;
  document.getElementById('pv-url-row').style.display='none';
})();

/* ── Resizer drag ── */
(function(){
  const rz=document.getElementById('resizer');
  const mw=document.getElementById('miller-wrap');
  const fr=document.getElementById('pv-frame');
  let drag=false,sx=0,sw=0;
  rz.addEventListener('mousedown',e=>{
    drag=true;sx=e.clientX;sw=mw.offsetWidth;
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    fr.style.pointerEvents='none';
    rz.classList.add('drag');
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const nw=Math.max(250,Math.min(sw+e.clientX-sx,window.innerWidth-400));
    mw.style.width=nw+'px';mw.style.maxWidth='none';mw.style.flex='none';
  });
  document.addEventListener('mouseup',()=>{
    if(drag){drag=false;document.body.style.cursor='';
      document.body.style.userSelect='';
      fr.style.pointerEvents='';rz.classList.remove('drag');}
  });
})();
</script>
