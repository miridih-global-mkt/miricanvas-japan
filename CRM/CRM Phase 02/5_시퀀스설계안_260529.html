<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>온보딩 시퀀스 설계안 — 2026-05-29</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

  header {
    background: #1a1a2e; color: #fff;
    padding: 20px 32px;
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 12px; color: #aaa; }

  .legend {
    display: flex; gap: 16px; padding: 10px 32px;
    background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend-sep { color: #ccc; }

  .seg-grid {
    display: flex; flex-direction: row; flex-wrap: nowrap;
    overflow-x: auto; gap: 16px; padding: 16px 24px;
    align-items: flex-start;
  }
  .seg-grid::-webkit-scrollbar { height: 6px; }
  .seg-grid::-webkit-scrollbar-track { background: #e8e8e8; border-radius: 3px; }
  .seg-grid::-webkit-scrollbar-thumb { background: #aaa; border-radius: 3px; }

  .seg-card {
    background: #fff; border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden;
    flex: 0 0 400px; min-width: 400px;
  }
  .seg-header {
    padding: 12px 16px; background: #1a1a2e; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  .seg-header h2 { font-size: 14px; font-weight: 600; }
  .seg-header .seg-meta { font-size: 11px; color: #aaa; }
  .seg-warn { font-size: 10px; background: #ff9800; color: #fff;
    padding: 2px 6px; border-radius: 10px; margin-left: 6px; }

  .mail-table {
    width: 100%; border-collapse: collapse; table-layout: fixed;
  }
  .mail-table col.c-seq  { width: 48px; }
  .mail-table col.c-day  { width: 48px; }
  .mail-table col.c-name { width: auto; }
  .mail-table col.c-act  { width: 44px; }
  .mail-table col.c-kpi  { width: 44px; }
  .mail-table col.c-n    { width: 84px; }
  .mail-table col.c-grade{ width: 40px; }

  .mail-table thead th {
    font-size: 10px; color: #aaa; text-transform: uppercase;
    letter-spacing: .5px; padding: 5px 6px;
    background: #fafafa; border-bottom: 1px solid #eee;
    text-align: center; font-weight: 500;
  }
  .mail-table thead th.th-name { text-align: left; }

  .mail-table tbody tr { border-left: 4px solid transparent; }
  .mail-table tbody td {
    padding: 6px 6px; font-size: 12px; vertical-align: middle;
    border-bottom: 1px solid #f5f5f5;
  }

  /* 등급별 색상 */
  .row-A { border-left-color: #27ae60 !important; background: #f0fff4; }
  .row-B { border-left-color: #2980b9 !important; background: #f0f8ff; }
  .row-C { border-left-color: #f39c12 !important; background: #fffdf0; }
  .row-G { border-left-color: #bdc3c7 !important; }
  .row-exp { opacity: .85; }

  /* 회차 배지 */
  .seq-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    font-size: 11px; font-weight: 700;
    background: #1a1a2e; color: #fff;
  }
  .seq-exp {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 2px 6px; border-radius: 10px;
    font-size: 10px; font-weight: 700;
    background: #8e44ad; color: #fff; white-space: nowrap;
  }
  .td-seq { text-align: center; }

  /* D+ 배지 */
  .day-tag {
    display: inline-block; font-size: 10px; font-weight: 600;
    color: #555; background: #ecf0f1; padding: 2px 5px;
    border-radius: 4px; white-space: nowrap;
  }
  .td-day { text-align: center; }

  .mail-name { font-weight: 500; color: #2c3e50;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .camp-tag { font-size: 10px; color: #999; margin-top: 1px; }
  .note-tag { font-size: 9px; color: #8e44ad; font-weight: 600; margin-top: 2px; }

  .td-score { text-align: center; font-weight: 600; font-size: 12px; }
  .pos { color: #27ae60; }
  .neg { color: #c0392b; }
  .zero { color: #bbb; }

  .td-n { text-align: right; font-size: 10px; color: #888; }
  .n-warn { color: #e67e22; font-weight: 600; }
  .n-crit { color: #c0392b; font-weight: 700; }
  .ctrl-n { color: #bbb; font-size: 9px; }

  .grade-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 6px; border-radius: 12px; text-align: center;
  }
  .badge-A { background: #27ae60; color: #fff; }
  .badge-B { background: #2980b9; color: #fff; }
  .badge-C { background: #f39c12; color: #fff; }
  .badge-G { background: #e0e0e0; color: #666; }

  /* 구간 헤더 */
  .block-header-row td {
    font-size: 11px; color: #fff; font-weight: 700;
    letter-spacing: .5px; padding: 6px 10px;
    background: #2c3e50;
  }
  .block-header-exp td { background: #6c3483; }

  /* 제외/비고 섹션 */
  .card-notes {
    padding: 8px 14px; font-size: 11px; color: #888;
    background: #fafafa; border-top: 1px solid #eee;
    line-height: 1.6;
  }
  .card-notes strong { color: #c0392b; }

  footer { padding: 24px; text-align: center; font-size: 11px; color: #aaa; }
</style>
</head>

const SEG_ORDER = ['NULL','STUDENT','COMPANY','INDIVIDUAL','EDUCATION','BUSINESS','INSTITUTION'];

function sc(v) { return v>0?'pos':v<0?'neg':'zero'; }
function ss(v) { return (v>0?'+':'')+v; }

function nClass(nC) {
  if (nC < 30) return 'n-crit';
  if (nC < 80) return 'n-warn';
  return '';
}
function nTag(nC) {
  if (nC < 30) return ' 🔴';
  if (nC < 80) return ' ⚠';
  return '';
}

function buildCard(seg, data) {
  const isInst = seg === 'INSTITUTION';
  const mainRows = data.rows.filter(r => r.seq !== '실험');
  const expRows  = data.rows.filter(r => r.seq === '실험');
  const totalSends = mainRows.length;

  let tbody = '';

  // JAS 구간
  const jasMain  = mainRows.filter(r => r.camp === 'JAS');
  const otherMain = mainRows.filter(r => r.camp !== 'JAS');

  if (jasMain.length) {
    tbody += `<tr class="block-header-row"><td colspan="7">📬 JAS 시리즈</td></tr>`;
    jasMain.forEach(r => tbody += renderRow(r));
  }
  if (otherMain.length) {
    if (jasMain.length) tbody += `<tr class="block-header-row" style="background:#34495e"><td colspan="7">📩 단발</td></tr>`;
    otherMain.forEach(r => tbody += renderRow(r));
  }
  if (expRows.length) {
    tbody += `<tr class="block-header-exp block-header-row"><td colspan="7">🔬 실험적 추가</td></tr>`;
    expRows.forEach(r => tbody += renderRow(r));
  }

  const notes = (data.notes||[]).map(n =>
    `<div>• ${n.includes('금지')||n.includes('제외') ? `<strong>${n}</strong>` : n}</div>`
  ).join('');

  return `<div class="seg-card">
    <div class="seg-header">
      <h2>${seg}${isInst?'<span class="seg-warn">⚠ 소표본</span>':''}</h2>
      <div class="seg-meta">${totalSends}회차 + 실험${expRows.length}개</div>
    </div>
    <table class="mail-table">
      <colgroup>
        <col class="c-seq"><col class="c-day"><col class="c-name">
        <col class="c-act"><col class="c-kpi"><col class="c-n"><col class="c-grade">
      </colgroup>
      <thead><tr>
        <th>회차</th><th>D+</th><th class="th-name">메일</th>
        <th>단기</th><th>장기</th><th>n</th><th>등급</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>
    ${notes ? `<div class="card-notes">${notes}</div>` : ''}
  </div>`;
}

function renderRow(r) {
  const isExp = r.seq === '실험';
  const seqCell = isExp
    ? `<span class="seq-exp">실험</span>`
    : `<span class="seq-num">${r.seq}</span>`;
  const campLabel = r.camp.replace('JA_SERIES','JAS').replace('EDU_SERIES','EDU');
  const nc = nClass(r.nC), nt = nTag(r.nC);
  const noteHtml = r.note ? `<div class="note-tag">※ ${r.note}</div>` : '';
  return `<tr class="row-${r.grade}${isExp?' row-exp':''}">
    <td class="td-seq">${seqCell}</td>
    <td class="td-day"><span class="day-tag">D+${r.day}</span></td>
    <td><div class="mail-name">${r.mail}</div><div class="camp-tag">${campLabel}</div>${noteHtml}</td>
    <td class="td-score ${sc(r.act)}">${ss(r.act)}</td>
    <td class="td-score ${sc(r.kpi)}">${ss(r.kpi)}</td>
    <td class="td-n ${nc}">n=${r.nT.toLocaleString()}${nt}<div class="ctrl-n">ctrl ${r.nC.toLocaleString()}</div></td>
    <td style="text-align:center"><span class="grade-badge badge-${r.grade}">${r.grade}</span></td>
  </tr>`;
}

const grid = document.getElementById('grid');
SEG_ORDER.forEach(seg => {
  if (SEQUENCES[seg]) grid.innerHTML += buildCard(seg, SEQUENCES[seg]);
});
