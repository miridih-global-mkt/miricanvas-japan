<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>CRM 캠페인 자동 생성</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="wrap narrow">
    <h1>CRM 캠페인 자동 생성</h1>
    <p class="muted">타겟과 큰 주제를 입력하면, 폴더의 기존 템플릿을 참고해 기획서 초안부터 HTML까지 자동으로 만듭니다.</p>
    {% if not providers %}
      <div class="status error">
        ⚠ 설정된 API 키가 없습니다. <code>_pipeline/.env</code> 파일에
        <code>ANTHROPIC_API_KEY</code>, <code>OPENAI_API_KEY</code>, <code>GOOGLE_API_KEY</code> 중
        최소 1개를 입력하고 서버를 재시작하세요.
      </div>
    {% endif %}
    <form method="POST" action="{{ url_for('start') }}">
      <label>
        <span>타겟 <small>(예: 가입 후 7일차 사용자)</small></span>
        <input type="text" name="target" required autofocus>
      </label>
      <label>
        <span>큰 주제 <small>(예: 폰트를 자유롭게 바꾸는 방법)</small></span>
        <input type="text" name="topic" required>
      </label>
      <label>
        <span>출력 언어</span>
        <select name="language">
          <option value="한국어">한국어</option>
          <option value="일본어">일본어</option>
          <option value="영어">영어</option>
        </select>
      </label>
      <label>
        <span>Provider <small>(.env 에 키가 설정된 것만 보임)</small></span>
        <select name="provider" {% if not providers %}disabled{% endif %}>
          {% for p in providers %}
            <option value="{{ p }}" {% if p == default_provider %}selected{% endif %}>
              {{ p }}{% if p == "anthropic" %} (Claude Opus/Sonnet){% elif p == "openai" %} (GPT-4o){% elif p == "google" %} (Gemini 1.5){% endif %}
            </option>
          {% endfor %}
        </select>
      </label>
      <button type="submit" class="primary" {% if not providers %}disabled{% endif %}>기획서 초안 생성</button>
    </form>
    <p class="muted small">생성은 수십 초 걸릴 수 있습니다.</p>
  </div>
</body>
</html>
